<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star — Homeschool Practice Apps</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<meta name="theme-color" content="#2A5D9F">
<style>
  :root {
    --bg: #FDF6EC; --text: #2A3A50; --card: #FFFFFF; --card-shadow: rgba(42,58,80,.10);
    --accent: #2A5D9F; --accent-soft: #E3EDF9; --green: #2E8B57; --green-soft: #DCEBDD;
    --gold: #E8A013; --gold-soft: #FBEBC8; --muted: #6B7686; --eyebrow: #B0763A;
    --body-text: #4A5568; --line: #EDE4D3;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: 'Lexend', 'Trebuchet MS', 'Comic Sans MS', sans-serif;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 48px 20px 60px; }
  .eyebrow {
    font-size: 13px; font-weight: 600; color: var(--eyebrow); letter-spacing: .12em;
    text-transform: uppercase; text-align: center; margin-bottom: 10px;
  }
  h1 { margin: 0 0 8px; font-size: 34px; font-weight: 800; text-align: center; }
  .sub {
    text-align: center; color: var(--body-text); font-size: 16px; max-width: 460px;
    margin: 0 auto 40px; line-height: 1.5;
  }
  .cards { display: grid; gap: 18px; }
  a.card {
    display: flex; align-items: center; gap: 18px; background: var(--card);
    border-radius: 20px; padding: 22px 24px; box-shadow: 0 2px 10px var(--card-shadow);
    text-decoration: none; color: inherit; border: 1px solid var(--line);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  a.card:hover, a.card:focus-visible { transform: translateY(-2px); box-shadow: 0 6px 18px var(--card-shadow); }
  a.card:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .icon {
    flex: none; width: 52px; height: 52px; border-radius: 14px; display: flex;
    align-items: center; justify-content: center; font-size: 26px;
  }
  .icon.math { background: var(--accent-soft); }
  .icon.spelling { background: var(--gold-soft); }
  .card-body h2 { margin: 0 0 3px; font-size: 19px; font-weight: 800; }
  .card-body p { margin: 0; font-size: 14px; color: var(--muted); }
  .arrow { margin-left: auto; color: var(--muted); font-size: 20px; flex: none; }
  footer { text-align: center; margin-top: 44px; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Star Apps</div>
    <h1>Pick a practice app</h1>
    <p class="sub">Quick, focused practice — bookmark this page once and both apps are always one tap away.</p>

    <div class="cards">
      <a class="card" href="./math-star-v6_1.html">
        <div class="icon math">🔢</div>
        <div class="card-body">
          <h2>Math Star</h2>
          <p>Facts practice, drills, and mastery tracking</p>
        </div>
        <div class="arrow">→</div>
      </a>

      <a class="card" href="./spelling-star-v6_3.html">
        <div class="icon spelling">⭐</div>
        <div class="card-body">
          <h2>Spelling Star</h2>
          <p>Word lists, pretests, and spelling games</p>
        </div>
        <div class="arrow">→</div>
      </a>
    </div>

    <footer>Progress is saved on this device only, for each app.</footer>
  </div>
</body>
</html>
