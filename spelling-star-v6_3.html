<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spelling Star</title>
<style>
  :root {
    --bg: #FDF6EC; --text: #2A3A50; --card: #FFFFFF; --card-shadow: rgba(42,58,80,.10);
    --accent: #2A5D9F; --accent-soft: #E3EDF9; --green: #2E8B57; --green-soft: #DCEBDD; --green-dark: #2E6B45;
    --danger: #C4553B; --gold: #E8A013; --gold-soft: #FBEBC8;
    --soft: #F2EBDD; --soft-text: #8A6A3B; --chip: #EDE4D3; --muted: #6B7686; --border: #C9CDD4;
    --line: #EDE4D3; --input-bg: #FFFDF8; --eyebrow: #B0763A; --body-text: #4A5568;
  }
  body[data-theme="mint"] {
    --bg: #EDF7F4; --text: #1F3D38; --card: #FFFFFF; --card-shadow: rgba(31,61,56,.10);
    --accent: #1F7A70; --accent-soft: #D8EFEA; --green: #2E8B57; --green-soft: #DCEBDD; --green-dark: #256B45;
    --danger: #C4553B; --gold: #D99114; --gold-soft: #FBEBC8;
    --soft: #DDEFE9; --soft-text: #2F6B5E; --chip: #D8EAE4; --muted: #5C7370; --border: #B9CFC9;
    --line: #DCEAE5; --input-bg: #FBFEFD; --eyebrow: #1F7A70; --body-text: #3D5A54;
  }
  body[data-theme="lavender"] {
    --bg: #F5F1FA; --text: #372B4E; --card: #FFFFFF; --card-shadow: rgba(55,43,78,.10);
    --accent: #6A4FA3; --accent-soft: #EAE3F6; --green: #2E8B57; --green-soft: #DCEBDD; --green-dark: #2E6B45;
    --danger: #C4553B; --gold: #D99114; --gold-soft: #F9EBC9;
    --soft: #ECE5F5; --soft-text: #5D4A85; --chip: #E6DEF2; --muted: #6E6482; --border: #C8BEDB;
    --line: #E6DFF1; --input-bg: #FDFCFE; --eyebrow: #6A4FA3; --body-text: #4C4163;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: 'Lexend', 'Trebuchet MS', 'Comic Sans MS', sans-serif;
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 20px 16px 60px; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .eyebrow { font-size: 13px; font-weight: 600; color: var(--eyebrow); letter-spacing: .12em; text-transform: uppercase; }
  h1 { margin: 0; font-size: 30px; font-weight: 800; }
  .card { background: var(--card); border-radius: 20px; padding: 24px; box-shadow: 0 2px 10px var(--card-shadow); margin-bottom: 16px; }
  button { font-family: inherit; font-weight: 600; font-size: 15px; padding: 10px 18px; border-radius: 14px; border: none; background: var(--accent); color: #fff; cursor: pointer; letter-spacing: .02em; }
  button.big { font-size: 22px; padding: 16px 32px; }
  button.outline { background: transparent; border: 2.5px solid var(--accent); color: var(--accent); }
  button.green { background: var(--green); }
  button.gold { background: var(--gold); color: var(--text); }
  button.danger { background: var(--danger); }
  button.link { background: none; color: var(--muted); font-size: 13px; text-decoration: underline; padding: 4px; }
  button:disabled { background: var(--border); color: #fff; cursor: default; border-color: var(--border); }
  input[type=text], input[type=password] { font-family: inherit; font-size: 15px; padding: 10px 12px; border-radius: 10px; border: 2px solid var(--border); width: 100%; margin-bottom: 8px; background: var(--input-bg); color: var(--text); }
  select { font-family: inherit; font-size: 15px; padding: 10px 12px; border-radius: 10px; border: 2px solid var(--border); background: var(--input-bg); color: var(--text); }
  #spellInput { font-size: 30px; font-weight: 600; letter-spacing: .15em; padding: 16px 18px; border-radius: 14px; border: 3px solid var(--border); }
  #spellInput.ok { border-color: var(--green); } #spellInput.bad { border-color: var(--danger); }
  .hint { background: var(--soft); border-radius: 14px; padding: 14px 18px; font-size: 17px; line-height: 1.5; margin-bottom: 24px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .muted { color: var(--muted); font-size: 14px; }
  .chip { background: var(--chip); border-radius: 10px; padding: 4px 12px; font-size: 14px; display: inline-block; margin: 3px; }
  .chip button { background: none; color: var(--muted); padding: 0 2px; font-size: 14px; }
  .chip.bonus { background: var(--gold-soft); }
  .feedback { min-height: 56px; margin-top: 14px; font-size: 19px; font-weight: 600; }
  .center { text-align: center; }
  details { padding: 8px 0; border-bottom: 1px solid var(--line); }
  summary { cursor: pointer; font-size: 15px; }
  label { font-size: 16px; display: block; padding: 4px 0; }
  .bonus-tag { color: var(--gold); font-weight: 700; }
  .kb { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
  .kb-row { display: flex; gap: 6px; justify-content: center; }
  .kb button { min-width: 30px; padding: 12px 0; font-size: 19px; font-weight: 800; border-radius: 10px; background: var(--card); color: var(--text); border: 2px solid var(--border); flex: 1; max-width: 48px; text-transform: uppercase; }
  .kb button:active { background: var(--accent-soft); border-color: var(--accent); }
  .kb button.kb-back { max-width: 110px; flex: 2; font-size: 16px; background: var(--soft); }
  .kb button:disabled { background: #EEE; color: #AAA; }
  .assigned-badge { background: var(--green-soft); color: var(--green-dark); border-radius: 8px; padding: 2px 10px; font-size: 12px; font-weight: 700; }
  .swatch { width: 84px; height: 56px; border-radius: 14px; border: 3px solid var(--border); cursor: pointer; display: inline-flex; align-items: flex-end; justify-content: center; padding-bottom: 4px; font-size: 12px; font-weight: 700; }
  .swatch.sel { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  button.spot-choice { background: var(--card); color: var(--text); border: 3px solid var(--border); }
  button.spot-choice.ok { border-color: var(--green); background: var(--green-soft); color: var(--green-dark); }
  button.spot-choice.bad { border-color: var(--danger); background: #FBEAE6; color: var(--danger); }
  button.spot-choice:disabled { opacity: .85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="eyebrow">Spelling Star</div>
      <h1 id="greeting">Welcome! &#11088;</h1>
    </div>
    <button class="outline" id="homeBtn" style="display:none" onclick="lockAndHome()">Home</button>
  </header>
  <div id="app"></div>
</div>

<script>
// ============================================================================
// v6.3 build — reliability/parent-control backport from Math Star v6, per
// design review: corrupted-profile detection & recovery on the picker screen,
// load()'s lastLoadError (distinguishes "no profile" from "unreadable
// profile"), persist() now returns success/failure with a save-failed banner
// on all 5 session-completion paths (finishSession, finishMergeDirect,
// finishMergePretest, finishRepeat, finishSpotIt — Math Star only needed one),
// a 300-session reliability cap, and resetProfile()/deleteProfile() in
// Settings. Kept-on-reset set: childName/pin/scoring/showHistory/
// pretestGlobal/gamesEnabled/advanceEnabled/advanceThreshold/theme/keyboard/
// repeatStandard/repeatHard/lists/activeListId/schedule — wiped: sessions/
// reviewWords/graduated. Incidental fix: load() now defaults reviewWords to
// [] for pre-existing saves that predate it.
// v6.2 build — all three build-order steps now landed (design v6 §5, v6.1 §3):
// #1 primitives + deleteSession cascade fix, #2 Advance, #3 Merge (this pass),
// plus the max-date-pretest display change (v6 §2.4) and the "Allow self-pacing"
// single-permission relabel (v6.1 §2). Gating for Merge uses data.advanceEnabled,
// not a separate mergeEnabled — that field was struck before ever being built
// (v6.1 §2). Two fixes made during this pass, beyond the spec:
//   (a) mergeEligible() now also requires !pretestGateActive() — the spec as
//       written let a freshly-assigned, pretest-gated list offer "give me more
//       words" at the same time as the "take your pretest first" banner.
//   (b) go() now nulls S and RP on every navigation, same as it already did
//       for SP. The v6 Games-hub note flagged this as a latent gap in the
//       Practice/Test/Pretest/Repeat engines and said Merge would need the
//       same discipline; Merge's "nothing is half-committed if you back out"
//       guarantee actually depends on it, so it's fixed here rather than left
//       for a future pass.
// Post-ship fix (regression from a divergent copy): Test/Pretest blind-answer
// neutrality had regressed — a wrong answer left the keyboard live and a
// "Check it" button on screen while a correct answer showed a locked green
// "Next word" button, telegraphing the result through button state and
// opening a same-word double-submit window before the 1000ms auto-advance
// fired. Fixed by locking on any answered state in Test/Pretest (not just
// correct) and showing no manual button at all once answered there —
// auto-advance is the only way forward, matching the original fix pattern.
// ============================================================================

// ---------- Storage keys / profiles ----------
function listProfiles() {
  const out = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (!k || !k.startsWith("spellingstar-")) continue;
    try {
      const d = JSON.parse(localStorage.getItem(k));
      if (d && d.childName && d.pin) { out.push({ key: k, name: d.childName, corrupted: false }); continue; }
      // Parses fine but is missing required fields — surface it as damaged
      // rather than silently dropping it (and the child's data with it).
      out.push({ key: k, name: k.replace(/^spellingstar-/, "") || "profile", corrupted: true });
    } catch(e) {
      out.push({ key: k, name: k.replace(/^spellingstar-/, "") || "profile", corrupted: true });
    }
  }
  return out.sort((a,b) => a.name.localeCompare(b.name));
}
function nameToKey(name) {
  const s = name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  return "spellingstar-" + (s || "child");
}
let KEY = null;
let data = null;

function freshData(childName, pin, scoring) {
  return {
    childName, pin, scoring,           // scoring: "percent" | "points"
    showHistory: true,
    pretestGlobal: false,
    gamesEnabled: true,
    advanceEnabled: false,      // child-led "ready for the next list?" prompt, off by default
    advanceThreshold: 90,       // % on a Test needed to unlock that prompt
    theme: "classic",
    keyboard: "abc",                   // "abc" | "qwerty"
    repeatStandard: 5,
    repeatHard: 8,
    lists: [{ id: "starter", name: "Starter Words", desc: "", words: [], bonus: [], pretest: "global" }],
    activeListId: "starter",
    reviewWords: [],
    sessions: [],
    schedule: defaultSchedule(),
    graduated: [],
  };
}
function defaultDay() { return { activity: "none", studyEnabled: true, practiceEnabled: true, testEnabled: true, repeatEnabled: true, gamesEnabled: true }; }
function defaultSchedule() { return Array.from({length:7}, defaultDay); } // 0=Sunday ... 6=Saturday

// Set by load() on failure so callers can tell "no profile at this key"
// (expected, e.g. first launch) apart from "data was there but unreadable"
// (real corruption, worth telling the parent about instead of silently
// treating it as if the profile never existed).
let lastLoadError = null;
function load(key) {
  lastLoadError = null;
  const raw = localStorage.getItem(key);
  if (!raw) return null;
  let d;
  try {
    d = JSON.parse(raw);
  } catch(e) {
    lastLoadError = "corrupted";
    return null;
  }
  try {
    KEY = key;
    // Migrations / defaults
    if (!d.schedule) d.schedule = defaultSchedule();
    d.schedule = d.schedule.map(day => Object.assign(defaultDay(), day));
    if (!d.graduated) d.graduated = [];
    if (d.showHistory === undefined) d.showHistory = true;
    if (d.pretestGlobal === undefined) d.pretestGlobal = false;
    if (d.gamesEnabled === undefined) d.gamesEnabled = true;
    if (d.advanceEnabled === undefined) d.advanceEnabled = false;
    if (d.advanceThreshold === undefined) d.advanceThreshold = 90;
    d.lists.forEach(l => { if (!l.pretest) l.pretest = "global"; });
    if (!d.theme) d.theme = "classic";
    if (!d.keyboard) d.keyboard = "abc";
    if (!d.scoring) d.scoring = "percent";
    if (!d.repeatStandard) d.repeatStandard = 5;
    if (!d.repeatHard) d.repeatHard = 8;
    // Incidental fix while touching migrations: old saves predating reviewWords
    // would leave this undefined, and every reviewWords.filter/find call
    // downstream assumes an array.
    if (!d.reviewWords) d.reviewWords = [];
    // Reliability cap (mirrors Math Star v6 §1): keep the file snappy on old
    // devices by capping stored session history; CSV export is the long-term
    // record.
    if (d.sessions && d.sessions.length > 300) {
      d.sessions = d.sessions.slice(d.sessions.length - 300);
    }
    return d;
  } catch(e) {
    lastLoadError = "corrupted";
    return null;
  }
}
function persist() {
  try {
    localStorage.setItem(KEY, JSON.stringify(data));
    return true;
  } catch(e) {
    return false;
  }
}
function saveFailedBannerHtml(kind) {
  const detail = kind === "merge"
    ? "This merge and its results may not be saved — if the app reloads before you free up space, the lists may look unmerged again."
    : kind === "history-only"
    ? "The activity above is real, but the device may be low on storage, so it wasn't saved to history."
    : "The score below is real, but the device may be low on storage, so it wasn't saved to history or results.";
  return `<div class="card" style="background:var(--gold-soft);border:2px solid var(--gold)">
    <div style="font-weight:700;margin-bottom:4px">&#9888;&#65039; This session couldn't be saved</div>
    <div class="muted" style="font-size:14px">${detail} Freeing up some space and trying again should fix it.</div>
  </div>`;
}
function activeList() { return data.lists.find(l => l.id === data.activeListId) || data.lists[0]; }
function pct(s) { return s.total ? Math.min(100, Math.round((s.score / s.total) * 100)) : 0; }
function fmtTest(s) { return data.scoring === "points" ? `${s.score}/${s.total}` : `${pct(s)}%`; }
function pretestRequired(list) {
  if (list.pretest === "require") return true;
  if (list.pretest === "skip") return false;
  return !!data.pretestGlobal;
}
function pretestGateActive() {
  const list = activeList();
  if (!pretestRequired(list)) return false;
  return !data.sessions.some(s => s.listName === list.name);
}

// ---------- Child-led list progression: shared primitives (design v6 §2.1) ----------
// hasTestSession also counts a perfect-pretest promotion, since that's stored as
// mode:"test" too (promotedFrom) — a child who aces the pretest already has a
// qualifying test on record, same as one who took the Test screen directly.
function hasTestSession(listName) {
  return data.sessions.some(s => s.mode === "test" && s.listName === listName);
}
// Reads data.lists' live order each time — if a parent reorders or deletes lists,
// this always reflects whatever "next" means right now. Nothing is cached.
function nextListFor(list) {
  const idx = data.lists.findIndex(l => l.id === list.id);
  return (idx >= 0 && idx < data.lists.length - 1) ? data.lists[idx + 1] : null;
}

// ---------- Advance: "ready for the next list?" (design v6 §2.2) ----------
function advanceEligible() {
  if (!data.advanceEnabled) return false;
  const list = activeList();
  const lastTest = [...data.sessions].reverse().find(s => s.mode === "test" && s.listName === list.name);
  if (!lastTest) return false;
  return pct(lastTest) >= data.advanceThreshold && !!nextListFor(list);
}
function tryAdvance() {
  const list = activeList();
  const next = nextListFor(list);
  if (!next) return; // shouldn't happen if the button was correctly gated
  if (!confirm(`Move on from "${list.name}" to "${next.name}"? You can always come back and practice old lists later.`)) return;
  data.activeListId = next.id;
  persist();
  renderHome();
}

// ---------- Merge: "give me more words" (design v6 §2.3, gating revised v6.1 §2) ----------
// Shares data.advanceEnabled with Advance — no separate mergeEnabled field (v6.1 §2).
function mergeEligible() {
  if (!data.advanceEnabled) return false;
  // Fix beyond spec: a freshly-assigned, pretest-gated list has zero sessions,
  // which also satisfies "!hasTestSession" below — without this check a gated
  // list would show both the pretest banner and "give me more words" at once.
  if (pretestGateActive()) return false;
  const list = activeList();
  if (hasTestSession(list.name)) return false; // tested lists advance, not merge
  const next = nextListFor(list);
  return !!next && (next.words.length + next.bonus.length) > 0;
}
function applyTheme() {
  document.body.dataset.theme = data && data.theme !== "classic" ? data.theme : "";
  if (data) document.getElementById("greeting").innerHTML = `Hi, ${esc(data.childName)}! &#11088;`;
}

// ---------- Speech ----------
function speak(text, slow) {
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = slow ? 0.7 : 0.85; u.pitch = 1.05;
    speechSynthesis.speak(u);
  } catch(e){}
}

// ---------- Helpers ----------
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// ---------- Router / lock ----------
const app = document.getElementById("app");
let parentUnlocked = false;

function lockAndHome() { parentUnlocked = false; go("home"); }
function go(view) {
  SP = null; // cancel any pending Spot the Spelling auto-advance — a stale timer must not fire post-navigation
  S = null;  // same discipline: a pending Practice/Test/Pretest/merge-pretest timer must not fire post-navigation
  RP = null; // same discipline for Repeat
  document.getElementById("homeBtn").style.display = view === "home" ? "none" : "";
  const today = data.schedule[new Date().getDay()] || defaultDay();
  if (view === "home") return renderHome();
  if (view === "history") { if (!data.showHistory) return renderHome(); return renderHistory(); }
  if (view === "study") { if (!today.studyEnabled || pretestGateActive()) return renderHome(); return renderStudy(); }
  if (view === "repeat") { if (!today.repeatEnabled || pretestGateActive()) return renderHome(); return startRepeat(); }
  if (view === "practice") { if (!today.practiceEnabled || pretestGateActive()) return renderHome(); return startSession("practice"); }
  if (view === "test") { if (!today.testEnabled || pretestGateActive()) return renderHome(); return startSession("test"); }
  if (view === "pretest") { if (!pretestGateActive()) return renderHome(); return startSession("pretest"); }
  if (view === "games") { if (!data.gamesEnabled || !today.gamesEnabled || pretestGateActive()) return renderHome(); return renderGames(); }
  if (view === "kidsettings") return renderKidSettings();
  if (view === "parent") return parentGate();
}

// ---------- First-launch setup wizard ----------
const setup = { pin: null, name: null };
function renderSetup(step) {
  document.getElementById("homeBtn").style.display = "none";
  document.getElementById("greeting").innerHTML = "Welcome! &#11088;";
  parentUnlocked = false;
  if (step === 1) {
    app.innerHTML = `
      <div class="card center" style="padding:36px;max-width:420px;margin:0 auto">
        <div style="font-size:34px;margin-bottom:10px">&#128274;</div>
        <div style="font-weight:700;font-size:18px;margin-bottom:6px">Step 1 of 3 &mdash; Set a parent PIN</div>
        <div class="muted" style="margin-bottom:14px">You'll need this PIN to open the parent dashboard, where you manage word lists, schedules, and results.</div>
        <input type="password" id="pinIn" inputmode="numeric" maxlength="8" placeholder="New PIN (at least 4 digits)" style="text-align:center;font-size:22px;letter-spacing:.3em">
        <input type="password" id="pinIn2" inputmode="numeric" maxlength="8" placeholder="Repeat PIN" style="text-align:center;font-size:22px;letter-spacing:.3em">
        <div id="setupMsg" class="muted" style="min-height:20px;color:var(--danger)"></div>
        <button class="big" onclick="setupPin()" style="margin-top:8px">Continue &rarr;</button>
      </div>`;
    document.getElementById("pinIn").focus();
  } else if (step === 2) {
    app.innerHTML = `
      <div class="card center" style="padding:36px;max-width:420px;margin:0 auto">
        <div style="font-size:34px;margin-bottom:10px">&#128075;</div>
        <div style="font-weight:700;font-size:18px;margin-bottom:6px">Step 2 of 3 &mdash; Who's spelling?</div>
        <div class="muted" style="margin-bottom:14px">This name appears throughout the app and on exported results.</div>
        <input type="text" id="nameIn" placeholder="Child's first name" style="text-align:center;font-size:20px">
        <div id="setupMsg" class="muted" style="min-height:20px;color:var(--danger)"></div>
        <button class="big" onclick="setupName()" style="margin-top:8px">Continue &rarr;</button>
      </div>`;
    document.getElementById("nameIn").focus();
  } else {
    app.innerHTML = `
      <div class="card center" style="padding:36px;max-width:420px;margin:0 auto">
        <div style="font-size:34px;margin-bottom:10px">&#127942;</div>
        <div style="font-weight:700;font-size:18px;margin-bottom:6px">Step 3 of 3 &mdash; How should test scores show?</div>
        <div class="muted" style="margin-bottom:16px">You can change this later in the parent dashboard.</div>
        <div style="display:flex;flex-direction:column;gap:12px;align-items:center">
          <button class="big outline" style="width:280px" onclick="setupFinish('percent')">Percentage (85%)</button>
          <button class="big outline" style="width:280px" onclick="setupFinish('points')">Points (17/20)</button>
        </div>
      </div>`;
  }
}
function setupPin() {
  const v = document.getElementById("pinIn").value.trim();
  const v2 = document.getElementById("pinIn2").value.trim();
  const msg = document.getElementById("setupMsg");
  if (v.length < 4) { msg.textContent = "PIN must be at least 4 digits."; return; }
  if (v !== v2) { msg.textContent = "PINs don't match — try again."; return; }
  setup.pin = v; renderSetup(2);
}
function setupName() {
  const v = document.getElementById("nameIn").value.trim();
  const msg = document.getElementById("setupMsg");
  if (!v) { msg.textContent = "Please enter a name."; return; }
  setup.name = v; renderSetup(3);
}
function setupFinish(scoring) {
  KEY = nameToKey(setup.name);
  const existing = localStorage.getItem(KEY);
  if (existing && !confirm(`This device already has saved data for a child named "${setup.name}". Continue and use that existing data?`)) return;
  if (existing) { data = load(KEY); }
  else { data = freshData(setup.name, setup.pin, scoring); persist(); }
  applyTheme();
  go("home");
}

// ---------- Profile picker ----------
function renderPicker() {
  document.getElementById("homeBtn").style.display = "none";
  document.getElementById("greeting").innerHTML = "Welcome! &#11088;";
  const profiles = listProfiles();
  const healthy = profiles.filter(p => !p.corrupted);
  const damaged = profiles.filter(p => p.corrupted);
  app.innerHTML = `
    <div class="card center" style="padding:36px;max-width:420px;margin:0 auto">
      <div style="font-size:34px;margin-bottom:10px">&#128075;</div>
      <div style="font-weight:700;font-size:18px;margin-bottom:16px">Who's spelling today?</div>
      <div style="display:flex;flex-direction:column;gap:12px;align-items:center">

}
function discardCorruptedProfile(key) {
  if (!confirm("This permanently deletes the damaged data at this profile so you can set it up fresh under the same name. This can't be undone. Continue?")) return;
  try { localStorage.removeItem(key); } catch(e) {}
  renderPicker();
}
function pickProfile(key) {

}

function parentGate() {
  if (parentUnlocked) return renderParent("results");
  app.innerHTML = `
    <div class="card center" style="padding:36px;max-width:400px;margin:0 auto">

      <button class="big" onclick="pinSubmit()" style="margin-top:8px">Unlock</button>
    </div>`;
  const pi = document.getElementById("pinIn");
  pi.focus();
  pi.addEventListener("keydown", e => { if (e.key==="Enter") pinSubmit(); });
}
function pinSubmit() {
  const v = document.getElementById("pinIn").value.trim();
  if (v === data.pin) { parentUnlocked = true; renderParent("results"); }
  else { document.getElementById("pinMsg").textContent = "That's not the right PIN."; document.getElementById("pinIn").value = ""; }
}

function renderHistory() {
  const tests = data.sessions.filter(s => s.mode === "test" && s.total > 0);
  if (!tests.length) {
    app.innerHTML = `<div class="card center" style="padding:40px">
      <div style="font-size:40px;margin-bottom:8px">&#128200;</div>

    return;

  const avg = Math.round(tests.reduce((sum, s) => sum + pct(s), 0) / tests.length);
  const best = {};
  tests.forEach(s => {
    const name = s.listName || "Untitled list";
    if (!best[name] || pct(s) > pct(best[name])) best[name] = s;

  const gradeColor = avg >= 90 ? "var(--green)" : avg >= 75 ? "var(--accent)" : "var(--eyebrow)";

  app.innerHTML = `

// ---------- Session ----------
let S = null;
function cheers() {
  const n = data.childName;
  return [
    `You can do it, ${n}! &#128170;`,
    "Get ready to learn something great!",
    "Take a deep breath — you've got this! &#127775;",
    "Every word you try makes your brain stronger!",
    "Focus up — you've got this! &#128640;",
    "Believe in yourself — we do!",
    "One word at a time. You're going to shine! &#10024;",
    "Mistakes are how we learn. Let's go!",
  ];
}
function startSession(mode) {
  const isTest = mode !== "practice";
  const list = activeList();
  const main = list.words.map(w => ({...w, type:"main"}));
  const mainWords = new Set(main.map(w => w.word));
  const review = data.reviewWords.filter(w => !mainWords.has(w.word)).map(w => ({...w, type:"review"}));
  let queue = shuffle([...main, ...review]);
  if (isTest) queue = [...queue, ...list.bonus.map(w => ({...w, type:"bonus"}))];
  if (!queue.length) { app.innerHTML = `<div class="card">This list is empty! Ask a parent to add words in the parent dashboard.</div>`; return; }
  S = { mode, isTest, queue, idx: 0, attempts: 0, results: [], listName: list.name };
  const C = cheers();
  const cheer = mode === "pretest" ? "Just show what you know — every answer helps!" : C[Math.floor(Math.random() * C.length)];
  const label = mode === "pretest" ? "&#128221; Pretest" : isTest ? "&#128221; Test time" : "&#127919; Practice time";
  app.innerHTML = `
    <div class="card center" style="padding:40px">
      <div style="font-size:14px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:8px">${label}</div>
      <h2 style="margin:0 0 6px;font-weight:800;font-size:26px">${esc(list.name)}</h2>
      ${list.desc ? `<div style="font-size:17px;color:var(--body-text);margin-bottom:14px;line-height:1.5">${esc(list.desc)}</div>` : ""}
      <div class="muted" style="margin-bottom:20px">${queue.length} words today</div>
      <div style="background:var(--soft);border-radius:14px;padding:16px 20px;font-size:19px;font-weight:600;margin-bottom:26px">${cheer}</div>
      <button class="big green" onclick="beginSession()">Let's start! &rarr;</button>
    </div>`;
}
function beginSession() {
  renderWord();
  speak(S.queue[0].word);
}

function kbRows() {
  return data.keyboard === "qwerty"
    ? ["QWERTYUIOP","ASDFGHJKL","ZXCVBNM"]
    : ["ABCDEFGHI","JKLMNOPQR","STUVWXYZ"];
}

function renderWord(state) {
  if (!S) return; // navigated away before a pending timer fired — nothing to render
  const w = S.queue[S.idx];
  const fb = state || "";
  // Locked whenever there's nothing left to do but wait/advance: a correct
  // Practice answer, a reveal, OR any answered state in Test/Pretest (correct
  // or wrong). That last clause is the fix — previously only "correct" locked
  // in Test/Pretest, so a wrong test answer left the keyboard live and "Check
  // it" on screen, which (a) telegraphed right-vs-wrong through button state
  // alone, breaking blind neutrality, and (b) left a window to submit a second
  // result for the same word before the 1000ms auto-advance timer fired —
  // same double-log class of bug as Math Star's comparison-widget fix.
  const locked = fb === "reveal" || (S.isTest ? (fb === "correct" || fb === "wrong") : fb === "correct");
  app.innerHTML = `
    <div class="card" style="padding:32px">
      <div style="display:flex;justify-content:space-between;font-size:14px;color:var(--muted);margin-bottom:20px">
        <span>${S.mode==="pretest"?"Pretest":S.isTest?"Test":"Practice"} · word ${S.idx+1} of ${S.queue.length}</span>
        ${w.type==="bonus"?'<span class="bonus-tag">&#10024; BONUS WORD</span>':""}
      </div>
      <div class="row" style="margin-bottom:20px">
        <button onclick="speak(S.queue[S.idx].word)">&#128266; Hear the word</button>
        <button class="outline" onclick="speak(S.queue[S.idx].word,true)">&#128034; Say it slowly</button>
        <button class="outline" onclick="speak(S.queue[S.idx].sentence)">&#128214; Hear a sentence</button>
      </div>
      <div class="hint">&#128161; ${esc(w.hint)}</div>
      <input type="text" id="spellInput" class="${S.isTest ? "" : (fb==="correct"?"ok":fb==="wrong"?"bad":"")}" placeholder="Tap the letters below"
        readonly inputmode="none" value="${esc(S.typed || "")}">
      <div class="kb" id="kb">
        ${kbRows().map((row,ri) => `<div class="kb-row">
          ${row.split("").map(ch => `<button ${locked?"disabled":""} onclick="kbType('${ch.toLowerCase()}')">${ch}</button>`).join("")}
          ${ri===2 ? `<button class="kb-back" ${locked?"disabled":""} onclick="kbBack()">&#9003; erase</button>` : ""}
        </div>`).join("")}
      </div>
      <div class="feedback" id="fb">${
        S.isTest && (fb==="correct"||fb==="wrong") ? '<span style="color:var(--muted)">&#10004;&#65039; Answer saved. On to the next one!</span>' :
        fb==="correct" ? '<span style="color:var(--green)">&#9989; Yes! That\'s it!</span>' :
        fb==="wrong" ? '<span style="color:var(--danger)">Not quite — listen again and give it another try. You\'ve got this!</span>' :
        fb==="reveal" ? `<span style="color:var(--accent);letter-spacing:.2em;font-size:26px">${esc(w.word.toUpperCase())}</span>` : ""
      }</div>
      <div class="row" style="margin-top:10px">
        ${S.isTest && (fb === "correct" || fb === "wrong")
          ? "" /* Test/Pretest: no manual button once answered, on purpose. Auto-advance
                 (the setTimeout in submitWord) is the only way forward — showing a button
                 here at all is what let a correct answer look different from a wrong one,
                 and a visible "Check it" also meant a fast second tap could log a second
                 result for the same word before the timer fired. */
          : locked
          ? '<button class="big green" onclick="nextWord()">Next word &rarr;</button>'
          : `<button class="big" onclick="submitWord()">Check it</button>
             ${!S.isTest && S.attempts >= 2 ? '<button class="outline" onclick="revealWord()">Show me the word</button>' : ""}`}
      </div>
    </div>`;
}

function kbType(ch) {

}
function kbBack() {

}

function submitWord() {
  const val = (S.typed || "").trim();
  if (!val) return;
  const w = S.queue[S.idx];
  const correct = val.toLowerCase() === w.word.toLowerCase();
  S.attempts++;
  if (S.isTest) {
    S.results.push({ word: w.word, correct, attempts: 1, type: w.type });
    S.typed = "";
    renderWord(correct ? "correct" : "wrong");
    setTimeout(nextWord, 1000);
  } else {
    if (correct) {
      S.results.push({ word: w.word, correct: true, attempts: S.attempts, type: w.type });
      S.typed = "";
      renderWord("correct");
    } else {
      S.typed = "";
      renderWord("wrong");
      setTimeout(() => renderWord(), 1400);
    }
  }
}

function revealWord() {
  const w = S.queue[S.idx];
  S.results.push({ word: w.word, correct: false, attempts: S.attempts, type: w.type });

}

function nextWord() {
  if (!S) return; // navigated away before a pending timer fired
  S.idx++; S.attempts = 0; S.typed = "";
  if (S.idx >= S.queue.length) return S.mergeContext ? finishMergePretest() : finishSession();
  renderWord();
  speak(S.queue[S.idx].word);
}

function finishSession() {
  const mainR = S.results.filter(r => r.type === "main");
  const bonusEarned = S.results.filter(r => r.type === "bonus" && r.correct).length;
  const session = {
    id: Date.now(), date: new Date().toISOString(), mode: S.mode, listName: S.listName,
    results: S.results,
    score: Math.min(mainR.filter(r => r.correct).length + bonusEarned, mainR.length),
    total: mainR.length, bonusEarned,
  };
  data.sessions.push(session);
  let promoted = false;
  if (S.mode === "pretest" && session.total > 0) {
    const perfect = mainR.length > 0 && mainR.every(r => r.correct);
    if (perfect) {
      // Perfect pretest (bonus words not required): duplicate as a regular test session
      data.sessions.push({ ...session, id: session.id + 1, mode: "test", promotedFrom: session.id });
      promoted = true;
    }
  }
  // Review-word graduation: 3 first-try correct spellings in a row -> word graduates
  S.results.filter(r => r.type === "review").forEach(r => {
    const rw = data.reviewWords.find(w => w.word === r.word);
    if (!rw) return;
    if (r.correct && r.attempts === 1) rw.streak = (rw.streak || 0) + 1;
    else if (!r.correct) rw.streak = 0;
    if ((rw.streak || 0) >= 3) {
      data.reviewWords = data.reviewWords.filter(w => w.word !== rw.word);
      data.graduated.push({ word: rw.word, date: new Date().toISOString() });
    }
  });
  const saved = persist();
  app.innerHTML = `
    ${saved ? "" : saveFailedBannerHtml()}
    <div class="card center" style="padding:40px">
      <div style="font-size:46px;margin-bottom:8px">${S.isTest?"&#127775;":"&#127881;"}</div>
      <h2 style="margin:0 0 8px;font-weight:800">Great work, ${esc(data.childName)}!</h2>
      ${S.mode==="pretest"
        ? `<div style="font-size:34px;font-weight:800">${fmtTest(session)}</div>
           <div class="muted" style="margin-top:4px">${promoted
             ? "A perfect pretest! &#127775; That counts as your test for this list."
             : "Now you know your words — practice is unlocked. You've got this!"}</div>`
        : S.isTest
        ? `<div style="font-size:34px;font-weight:800">${fmtTest(session)}</div>
           <div class="muted" style="margin-top:4px">${session.score} of ${session.total} words${session.bonusEarned?` · includes +${session.bonusEarned} bonus!`:""}</div>`
        : `<div class="muted">You practiced ${S.results.length} words. Every try makes you stronger!</div>`}
      <div style="margin-top:24px"><button class="big" onclick="go('home')">Done</button></div>
    </div>`;

  const queue = shuffle([

function finishMergePretest() {

  list.bonus.push(...newBonus);
  data.lists = data.lists.filter(l => l.id !== next.id); // retire the source list

// ---------- Spot the Spelling (recognition mini-game) ----------
// Shared misspelling generator: reusable by future recognition games.
function realWordSet() {
  const set = new Set();
  data.lists.forEach(l => { l.words.forEach(w => set.add(w.word)); l.bonus.forEach(w => set.add(w.word)); });
  data.reviewWords.forEach(w => set.add(w.word));
  data.graduated.forEach(w => set.add(w.word));
  return set;
}
function generateMisspelling(word) {
  const w = (word || "").toLowerCase();
  const realWords = realWordSet();
  const mutators = [];
  // adjacent-letter transpose — universal fallback, works for any word length >= 2
  if (w.length >= 2) mutators.push(() => {
    const i = Math.floor(Math.random() * (w.length - 1));
    const arr = w.split("");
    [arr[i], arr[i+1]] = [arr[i+1], arr[i]];
    return arr.join("");
  });
  // double a letter
  mutators.push(() => {
    const i = Math.floor(Math.random() * w.length);
    return w.slice(0, i+1) + w[i] + w.slice(i+1);
  });
  // undouble a letter (only if the word actually has a double)
  const doubles = [];
  for (let i = 0; i < w.length - 1; i++) if (w[i] === w[i+1]) doubles.push(i);
  if (doubles.length) mutators.push(() => {
    const i = doubles[Math.floor(Math.random() * doubles.length)];
    return w.slice(0, i) + w.slice(i+1);
  });
  // phonetic substitution table
  [[/ie/, "ei"], [/ei/, "ie"], [/ph/, "f"], [/f/, "ph"], [/ck/, "k"], [/c/, "k"], [/k/, "c"], [/s/, "z"], [/z/, "s"]]
    .forEach(([pat, repl]) => { if (pat.test(w)) mutators.push(() => w.replace(pat, repl)); });
  // silent-letter drop (common patterns: trailing e, gh, leading kn/wr/gn, trailing mb)
  [/e$/, /gh/, /^kn/, /^wr/, /mb$/, /^gn/]
    .forEach(p => { if (p.test(w)) mutators.push(() => w.replace(p, "")); });

  for (const fn of shuffle(mutators)) {
    let result; try { result = fn(); } catch(e) { result = null; }
    if (result && result !== w && !realWords.has(result)) return result;
  }
  // guaranteed fallback: try every transpose offset
  for (let i = 0; i < w.length - 1; i++) {
    const arr = w.split(""); [arr[i], arr[i+1]] = [arr[i+1], arr[i]];
    const r = arr.join("");
    if (r !== w && !realWords.has(r)) return r;
  }
  // last resort: duplicate the final letter (always a different, non-empty string)
  return w + (w[w.length-1] || "x");
}

let SP = null;
function startSpotIt() {
  const list = activeList();
  const mainWords = list.words.map(w => w.word);

    return;

  app.innerHTML = `
    <div class="card" style="padding:32px">
      <div style="font-size:14px;color:var(--muted);margin-bottom:20px">&#128269; Spot the Spelling &middot; round ${SP.idx+1} of ${SP.rounds.length}</div>
      <div class="muted center" style="margin-bottom:18px">Which one is spelled correctly?</div>
      <div class="row" style="gap:14px;justify-content:center">
        <button ${locked?"disabled":""} class="spot-choice ${cls("left")}" style="font-size:24px;letter-spacing:.06em;padding:22px 20px;flex:1;max-width:220px" onclick="submitSpot('left')">${esc(leftWord)}</button>
        <button ${locked?"disabled":""} class="spot-choice ${cls("right")}" style="font-size:24px;letter-spacing:.06em;padding:22px 20px;flex:1;max-width:220px" onclick="submitSpot('right')">${esc(rightWord)}</button>
      </div>
      <div class="feedback center" id="fb" style="margin-top:18px">${
        fb === "correct" ? '<span style="color:var(--green)">&#9989; Yes! That\'s the one!</span>' :
        fb === "wrong" ? `<span style="color:var(--danger)">Not quite &mdash; <strong>${esc(r.word)}</strong> is the real spelling.</span>` : ""
      }</div>
    </div>`;
}
function submitSpot(side) {
  if (!SP || SP.locked) return;
  const r = SP.rounds[SP.idx];
  const correct = side === r.correctSide;
  SP.locked = true; SP.pickedSide = side;
  SP.results.push({ word: r.word, correct });
  renderSpotItRound(correct ? "correct" : "wrong");
  setTimeout(nextSpot, 1000);
}
function nextSpot() {
  if (!SP) return; // navigated away before the timer fired — nothing to advance
  SP.idx++; SP.locked = false; SP.pickedSide = null;
  if (SP.idx >= SP.rounds.length) return finishSpotIt();
  renderSpotItRound();
}
function finishSpotIt() {
  if (!SP) return;
  const session = {
    id: Date.now(), date: new Date().toISOString(), mode: "spotit", listName: SP.listName,
    results: SP.results, score: 0, total: 0,
  };
  data.sessions.push(session);
  const saved = persist();
  const right = SP.results.filter(r => r.correct).length;
  const total = SP.results.length;
  app.innerHTML = `
    ${saved ? "" : saveFailedBannerHtml("history-only")}
    <div class="card center" style="padding:40px">
      <div style="font-size:46px;margin-bottom:8px">&#127919;</div>
      <h2 style="margin:0 0 8px;font-weight:800">Nice spotting, ${esc(data.childName)}!</h2>
      <div class="muted">You got ${right} of ${total} right. Sharp eyes make better spellers!</div>
      <div style="margin-top:24px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="big outline" onclick="go('games')">Play again</button>
        <button class="big" onclick="go('home')">Done</button>
      </div>
    </div>`;
}

let selectedListId = null;
let selectedResultsList = null;

function resultGroups() {
  // Group sessions by list name; order by most recent session desc
  const groups = {};
  data.sessions.forEach(s => {
    const name = s.listName || "Untitled list";
    if (!groups[name]) groups[name] = [];
    groups[name].push(s);
  });
  return Object.entries(groups)
    .map(([name, sessions]) => ({ name, sessions, latest: Math.max(...sessions.map(x => x.id)) }))
    .sort((a, b) => b.latest - a.latest);
}

function selectResultsList(name) { selectedResultsList = name; renderParent("results"); }
function setListPretest(id, value) {
  const l = data.lists.find(x => x.id === id);

  l.pretest = value; persist(); renderParent("words");
}
function setSetting(field, value) { data[field] = value; persist(); renderParent("settings"); }
function setRepeatCount(field, value) {
  const n = parseInt(value, 10);
  if (!Number.isFinite(n) || n < 1) { renderParent("settings"); return; }
  data[field] = Math.min(n, 50);
  persist(); renderParent("settings");
}
function setAdvanceThreshold(value) {
  const n = parseInt(value, 10);
  if (!Number.isFinite(n)) { renderParent("settings"); return; }
  data.advanceThreshold = Math.max(0, Math.min(100, n));
  persist(); renderParent("settings");
}
function renameChild() {
  const v = document.getElementById("renameIn").value.trim();
  if (!v) { alert("Name can't be empty."); return; }
  data.childName = v; persist(); applyTheme(); renderParent("settings");
}
function deleteSession(id) {
  const s = data.sessions.find(x => x.id === id);
  if (!s) return;
  if (!confirm(`Delete this ${s.mode} session from ${new Date(s.date).toLocaleString()}? This removes it from history, averages, and the CSV export. It can't be undone.`)) return;
  // A perfect pretest and its auto-promoted test twin are one linked pair — deleting
  // either half now removes both, so no orphaned duplicate keeps feeding the
  // average after its source is gone (design v6 §2.5).
  const linkedId = s.promotedFrom || data.sessions.find(x => x.promotedFrom === s.id)?.id;
  data.sessions = data.sessions.filter(x => x.id !== id && x.id !== linkedId);
  persist(); renderParent("results");
}
function setSched(dayIdx, field, value) {
  data.schedule[dayIdx][field] = value;
  persist();
}
function selectList(id) { selectedListId = id; renderParent("words"); }
function assignList(id) { data.activeListId = id; persist(); renderParent("words"); }
function createList() {
  const name = document.getElementById("newListName").value.trim();
  const desc = document.getElementById("newListDesc").value.trim();
  if (!name) return;
  if (data.lists.some(l => l.name.toLowerCase() === name.toLowerCase())) { alert("A list with that name already exists."); return; }
  const id = "l" + Date.now();
  data.lists.push({ id, name, desc, words: [], bonus: [] });
  selectedListId = id; persist(); renderParent("words");
}
function saveDesc() {
  const sel = data.lists.find(l => l.id === selectedListId);
  if (!sel) return;
  sel.desc = document.getElementById("editDesc").value.trim();
  persist(); renderParent("words");
}
function parseCSVLine(line) {
  const out = []; let cur = ""; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQ) {
      if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (ch === '"') inQ = false;
      else cur += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ",") { out.push(cur); cur = ""; }
      else cur += ch;
    }
  }
  out.push(cur);
  return out.map(s => s.trim());
}
function importCSV() {
  const sel = data.lists.find(l => l.id === selectedListId);
  const fileInput = document.getElementById("csvFile");
  const msg = document.getElementById("csvMsg");
  if (!sel || !fileInput.files.length) { msg.textContent = "Choose a CSV file first."; return; }
  const reader = new FileReader();
  reader.onload = () => {
    const lines = reader.result.split(/\r?\n/).filter(l => l.trim());
    let added = 0, skipped = 0;
    lines.forEach((line, i) => {
      const [word, hint, sentence, bonus] = parseCSVLine(line);
      if (!word) return;
      const w = word.toLowerCase();
      if (i === 0 && w === "word") return; // header row
      if ([...sel.words, ...sel.bonus].some(x => x.word === w)) { skipped++; return; }
      const entry = { word: w, hint: (hint || "A word you're learning."), sentence: (sentence || w) };
      if ((bonus || "").toLowerCase().startsWith("y") || (bonus || "").toLowerCase() === "true") sel.bonus.push(entry);
      else sel.words.push(entry);
      added++;
    });
    persist();
    msg.textContent = `Imported ${added} word${added===1?"":"s"}${skipped?`, skipped ${skipped} duplicate${skipped===1?"":"s"}`:""}.`;
    setTimeout(() => renderParent("words"), 1200);
  };
  reader.readAsText(fileInput.files[0]);
}
function deleteList(id) {
  const l = data.lists.find(x => x.id === id);
  if (!l) return;
  if (!confirm(`Delete "${l.name}" and its ${l.words.length + l.bonus.length} words? Past results are kept.`)) return;
  data.lists = data.lists.filter(x => x.id !== id);
  if (selectedListId === id) selectedListId = data.activeListId;
  persist(); renderParent("words");
}
function addWord() {
  const sel = data.lists.find(l => l.id === selectedListId);
  const word = document.getElementById("nw").value.trim().toLowerCase();
  if (!word || !sel) return;
  if ([...sel.words, ...sel.bonus].some(w => w.word === word)) { alert("That word is already in this list."); return; }
  const entry = {
    word,
    hint: document.getElementById("nh").value.trim() || "A word you're learning.",
    sentence: document.getElementById("ns").value.trim() || word,
  };
  if (document.getElementById("nb").checked) sel.bonus.push(entry); else sel.words.push(entry);
  persist(); renderParent("words");
}
function removeWord(kind, word) {
  const sel = data.lists.find(l => l.id === selectedListId);
  if (!sel) return;
  sel[kind] = sel[kind].filter(w => w.word !== word);
  persist(); renderParent("words");
}
function addReview() {
  const lookup = data.lists.flatMap(l => [...l.words, ...l.bonus]);
  document.querySelectorAll(".missChk:checked").forEach(c => {
    const full = lookup.find(w => w.word === c.value) || { word: c.value, hint: "Review word", sentence: c.value };
    if (!data.reviewWords.some(r => r.word === full.word)) data.reviewWords.push(full);
  });
  persist(); renderParent("results");
}
function clearGraduated() { data.graduated = []; persist(); renderParent("results"); }
function removeReview(word) { data.reviewWords = data.reviewWords.filter(w => w.word !== word); persist(); renderParent("results"); }
function resetProfile() {
  const kept = {
    childName: data.childName, pin: data.pin, scoring: data.scoring,
    showHistory: data.showHistory, pretestGlobal: data.pretestGlobal,
    gamesEnabled: data.gamesEnabled, advanceEnabled: data.advanceEnabled,
    advanceThreshold: data.advanceThreshold, theme: data.theme, keyboard: data.keyboard,
    repeatStandard: data.repeatStandard, repeatHard: data.repeatHard,
    lists: data.lists, activeListId: data.activeListId, schedule: data.schedule,
  };
  if (!confirm(`This clears ALL of ${kept.childName}'s progress — every session, review word, and graduated word — back to zero. Word lists, settings, PIN, and schedule are kept. This can't be undone. Continue?`)) return;
  // Rebuild from freshData (the single source of truth for "blank progress")
  // and layer the settings/content we're keeping back on top, rather than
  // hand-listing every progress field to blank out.
  data = Object.assign(freshData(kept.childName, kept.pin, kept.scoring), kept);
  persist();
  applyTheme();
  renderParent("settings");
}
function deleteProfile() {
  const name = data.childName;
  const enteredPin = prompt(`Type ${name}'s PIN to permanently delete this profile:`);
  if (enteredPin === null) return;
  if (enteredPin !== data.pin) { alert("Wrong PIN — nothing was deleted."); return; }
  if (!confirm(`This permanently deletes ${name}'s entire profile — progress, settings, and PIN. This can't be undone. Continue?`)) return;
  try { localStorage.removeItem(KEY); } catch(e) {}
  data = null; KEY = null;
  parentUnlocked = false;
  if (listProfiles().length === 0) renderSetup(1);
  else renderPicker();
}
function changePin() {
  const cur = prompt("Enter current PIN:");
  if (cur !== data.pin) { alert("Wrong PIN."); return; }
  const np = prompt("New PIN (at least 4 digits):");
  if (!np || np.trim().length < 4) { alert("PIN must be at least 4 digits."); return; }
  data.pin = np.trim(); persist(); alert("PIN updated.");
}
function exportCSV() {
  const rows = [["child","date","time","mode","list","word","type","correct","attempts"]];
  data.sessions.forEach(s => {
    const d = new Date(s.date);
    s.results.forEach(r => rows.push([data.childName, d.toLocaleDateString(), d.toLocaleTimeString(), s.mode, s.listName || "", r.word, r.type || (s.mode==="repeat" ? (r.extra?"repeat-extra":"repeat") : s.mode==="spotit" ? "spotit" : ""), r.correct===undefined ? "n/a" : (r.correct?"yes":"no"), r.attempts!==undefined ? r.attempts : (r.reps!==undefined ? r.reps : "")]));
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${nameToKey(data.childName).replace("spellingstar-","")}-spelling-results.csv`;
  a.click();
}

// ---------- Boot ----------
(function boot() {
  const profiles = listProfiles();
  if (profiles.length === 0) return renderSetup(1);
  if (profiles.length === 1) { data = load(profiles[0].key); if (data) { applyTheme(); return go("home"); } }
  renderPicker();
})();
</script>
</body>
